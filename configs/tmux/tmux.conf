# ~/.tmux.conf — devflow
# prefix Ctrl-a   |   vi copy   |   hjkl nav   |   |/- splits   |   Alt+hjkl resize

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# basics
set  -g mouse on
set  -g history-limit 100000
set  -g escape-time 10
set  -g focus-events on
set  -g renumber-windows on
set  -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi

# colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"

# reload
bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux config"

# splits inherit cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane nav (vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# repeatable resize via prefix HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# resize without prefix (Alt+hjkl)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# copy mode
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Escape send -X cancel

# y -> system clipboard. pbcopy on macOS, wl-copy/xclip on Linux.
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'sh -c \"command -v wl-copy >/dev/null 2>&1 && wl-copy || (command -v xclip >/dev/null 2>&1 && xclip -selection clipboard) || cat >/dev/null\"'"

# sync-panes toggle (handy for SSH-into-N-hosts)
bind S setw synchronize-panes \; display "sync-panes #{?pane_synchronized,on,off}"

# status bar (minimal)
set -g status-bg black
set -g status-fg white
set -g status-left  "#[fg=green]#S"
set -g status-right "#[fg=cyan]%H:%M #[fg=yellow]%d-%b-%y"
