# starship prompt

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = true
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[username]
style_user  = "yellow bold"
style_root  = "red bold"
format      = "[$user]($style)"
show_always = false   # only when SSH'd or root

[hostname]
ssh_only = true
format   = "[@$hostname](bold purple) "
trim_at  = "."

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold blue"
format            = "[$path]($style)[$read_only]($read_only_style) "
read_only         = " 🔒"

[git_branch]
symbol = " "
style  = "bold magenta"
format = "on [$symbol$branch]($style) "

[git_status]
style      = "bold red"
format     = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
stashed    = "$"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

[cmd_duration]
min_time = 2000
format   = "took [$duration](bold yellow) "
